name: Release

on:
  push:
    branches:
      - main

permissions:
  contents: write
  packages: write

env:
  CHART_PATH: charts/ebpf-firewall

jobs:
  build-and-release:
    name: Build and release
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Set up Helm
        uses: azure/setup-helm@v4

      - name: Set up kubectl
        uses: azure/setup-kubectl@v4

      - name: Set up Kind
        uses: helm/kind-action@v1
        with:
          install_only: true

      - name: Compute release metadata
        id: meta
        run: |
          set -euo pipefail

          chart_version="$(awk '/^version:/{print $2; exit}' "$CHART_PATH/Chart.yaml")"
          major_minor="${chart_version%.*}"
          release_version="${major_minor}.${GITHUB_RUN_NUMBER}"
          app_version="${GITHUB_SHA::12}"
          image_repository="ghcr.io/${GITHUB_REPOSITORY,,}"
          image_tag="sha-${app_version}"

          echo "release_version=${release_version}" >> "$GITHUB_OUTPUT"
          echo "app_version=${app_version}" >> "$GITHUB_OUTPUT"
          echo "image_repository=${image_repository}" >> "$GITHUB_OUTPUT"
          echo "image_tag=${image_tag}" >> "$GITHUB_OUTPUT"
          echo "release_tag=ebpf-firewall-${release_version}" >> "$GITHUB_OUTPUT"

      - name: Run tests
        run: go test ./...

      - name: Lint Helm chart
        run: helm lint "$CHART_PATH"

      - name: Run Kind e2e tests
        run: make e2e-kind

      - name: Log in to GHCR
        run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u "${{ github.actor }}" --password-stdin

      - name: Build and push image
        run: |
          set -euo pipefail

          image="${{ steps.meta.outputs.image_repository }}"
          tag="${{ steps.meta.outputs.image_tag }}"

          docker build \
            --label "org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}" \
            --label "org.opencontainers.image.revision=${{ github.sha }}" \
            --label "org.opencontainers.image.version=${{ steps.meta.outputs.release_version }}" \
            -t "${image}:${tag}" \
            -t "${image}:latest" \
            .

          docker push "${image}:${tag}"
          docker push "${image}:latest"

      - name: Bump chart version for release
        run: |
          set -euo pipefail

          sed -i "s/^version:.*/version: ${{ steps.meta.outputs.release_version }}/" "$CHART_PATH/Chart.yaml"
          sed -i "s/^appVersion:.*/appVersion: \"${{ steps.meta.outputs.app_version }}\"/" "$CHART_PATH/Chart.yaml"
          sed -i "s|^  repository:.*|  repository: ${{ steps.meta.outputs.image_repository }}|" "$CHART_PATH/values.yaml"
          sed -i "s|^  tag:.*|  tag: ${{ steps.meta.outputs.image_tag }}|" "$CHART_PATH/values.yaml"

      - name: Package Helm chart
        run: |
          set -euo pipefail

          mkdir -p dist
          helm lint "$CHART_PATH"
          helm package "$CHART_PATH" --destination dist

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.meta.outputs.release_tag }}
          name: ebpf-firewall ${{ steps.meta.outputs.release_version }}
          target_commitish: ${{ github.sha }}
          generate_release_notes: true
          files: dist/*.tgz
