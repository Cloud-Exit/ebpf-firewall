apiVersion: v1
kind: Namespace
metadata:
  name: e2e
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: allowlist
  namespace: e2e
data:
  allowlist.txt: |
    10.244.0.0/16
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: allowlist-server
  namespace: e2e
spec:
  replicas: 1
  selector:
    matchLabels:
      app: allowlist-server
  template:
    metadata:
      labels:
        app: allowlist-server
    spec:
      containers:
        - name: server
          image: e2e-http-server:dev
          imagePullPolicy: IfNotPresent
          env:
            - name: SERVE_FILE
              value: /data/allowlist.txt
          ports:
            - containerPort: 8080
          volumeMounts:
            - name: allowlist
              mountPath: /data
              readOnly: true
      volumes:
        - name: allowlist
          configMap:
            name: allowlist
---
apiVersion: v1
kind: Service
metadata:
  name: allowlist-server
  namespace: e2e
spec:
  selector:
    app: allowlist-server
  ports:
    - name: http
      port: 8080
      targetPort: 8080
---
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: protected-server
  namespace: e2e
spec:
  selector:
    matchLabels:
      app: protected-server
  template:
    metadata:
      labels:
        app: protected-server
    spec:
      hostNetwork: true
      dnsPolicy: ClusterFirstWithHostNet
      nodeSelector:
        kubernetes.io/os: linux
      tolerations:
        - operator: Exists
      containers:
        - name: server
          image: e2e-http-server:dev
          imagePullPolicy: IfNotPresent
          env:
            - name: LISTEN_ADDR
              value: ":18080"
            - name: RESPONSE
              value: protected-ok
          ports:
            - containerPort: 18080
              hostPort: 18080
